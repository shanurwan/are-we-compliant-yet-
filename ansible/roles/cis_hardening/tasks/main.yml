---
- name: Ensure package cache is updated (Debian/Ubuntu)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin {{ ssh_permit_root_login }}'
    create: yes
    backup: yes
  notify: Restart ssh

- name: Enforce password aging in /etc/login.defs
  lineinfile:
    path: /etc/login.defs
    regexp: '^{{ item.key }}'
    line: '{{ item.key }} {{ item.value }}'
  loop:
    - { key: PASS_MAX_DAYS, value: "{{ password_max_days }}" }
    - { key: PASS_MIN_DAYS, value: "{{ password_min_days }}" }
    - { key: PASS_WARN_AGE, value: "{{ password_warn_age }}" }

- name: Install and enable auditd
  apt:
    name: auditd
    state: present
  notify: Restart auditd

- name: Install and configure time sync (chrony)
  apt:
    name: chrony
    state: present
  notify: Restart chrony

- name: Deploy chrony.conf
  template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart chrony

- name: Optionally install fail2ban
  apt:
    name: fail2ban
    state: present
  when: fail2ban_enabled | bool

- name: Deploy basic fail2ban jail (ssh)
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.d/ssh-hardening.local
    owner: root
    group: root
    mode: '0644'
  when: fail2ban_enabled | bool
  notify: Restart fail2ban
